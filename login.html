<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập & Đăng ký - Q&H SKINLAB</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page-container {
            display: flex;
            justify-content: center;
            padding: 80px 0;
            background: #f9f9f9;
            min-height: 80vh;
        }
        .login-box {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }
        .login-box h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--black);
        }
    </style>
</head>
<body>
    <!-- HEADER (Đã đồng bộ) -->
    <div class="sticky-header" id="stickyHeader">
        <header>
            <div class="container header-main">
                <a href="index.html" class="logo">Q&<span>H SKINLAB</span></a>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Tìm sản phẩm, danh mục hay thương hiệu mong muốn">
                    <button class="search-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div class="header-actions">
                    <div class="hotline-info" id="headerHotline">Hotline: 1900 636 510</div>
                    <div class="action-item" id="accountTrigger">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <span id="userNameDisplay" class="user-name-display"></span>
                    </div>
                    <div class="action-item" id="cartTrigger">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                        <span class="cart-badge" id="cartBadge">0</span>
                    </div>
                </div>
            </div>
        </header>
    </div>

    <main class="login-page-container">
        <div class="login-box">
            <div id="loginView">
                <h2>Đăng nhập</h2>
                <form class="login-form" id="loginForm">
                    <input type="text" placeholder="Email hoặc Tên đăng nhập" required>
                    <input type="password" placeholder="Mật khẩu" required>
                    <div class="login-options">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox"> Ghi nhớ đăng nhập
                        </label>
                        <a href="#">Quên mật khẩu?</a>
                    </div>
                    <button type="submit" class="btn-login">Đăng nhập</button>
                    <button type="button" class="btn-social btn-facebook">Đăng nhập Facebook</button>
                    <button type="button" class="btn-social btn-google">Đăng nhập Google</button>
                    <div class="register-section">
                        <p>Chưa có tài khoản?</p>
                        <button type="button" class="btn-register" id="toRegister">Đăng ký ngay</button>
                    </div>
                </form>
            </div>

            <div id="registerView" style="display: none;">
                <h2>Đăng ký tài khoản</h2>
                <form class="login-form" id="registerForm">
                    <input type="text" placeholder="Họ và tên" required>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Mật khẩu" required>
                    <input type="password" placeholder="Nhập lại mật khẩu" required>
                    <button type="submit" class="btn-login">Đăng ký</button>
                    <div class="register-section">
                        <p>Đã có tài khoản?</p>
                        <button type="button" class="btn-register" id="toLogin">Đăng nhập</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Nếu đã login thì chuyển sang index.html
            if (localStorage.getItem('qh_isLoggedIn') === 'true') {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
